# ==============================================================================
# Coraza WAF 主规则链配置入口
# ==============================================================================
# 此文件由 coraza_rules_file 指令引用,按顺序加载所有规则
# 
# 加载顺序 (参考 OWASP CRS 官方建议):
#   1. Coraza 引擎基础配置
#   2. CRS 初始化配置 (crs-setup.conf)
#   3. CRS 插件前置配置 (*-config.conf, *-before.conf)
#   4. CRS 核心规则 (rules/*.conf)
#   5. CRS 插件后置配置 (*-after.conf)
#   6. 自定义规则与覆盖
# ==============================================================================

# -- 1. Coraza 引擎基础配置 ----------------------------------------------------
Include /data/nginx/conf/waf/coraza-recommended.conf

# -- 2. CRS 初始化配置 (可自定义异常分、阈值、地理/IP白名单等) ------------------
Include /data/nginx/conf/waf/crs-setup.conf

# -- 3. CRS 插件前置配置 -------------------------------------------------------
Include /data/nginx/conf/waf/owasp-crs/plugins/*-config.conf
Include /data/nginx/conf/waf/owasp-crs/plugins/*-before.conf

# -- 4. CRS 核心规则 (OWASP 维护的攻击检测规则集) -----------------------------
Include /data/nginx/conf/waf/owasp-crs/rules/*.conf

# -- 5. CRS 插件后置配置 -------------------------------------------------------
Include /data/nginx/conf/waf/owasp-crs/plugins/*-after.conf

# -- 6. 自定义规则 (用户可在此目录添加规则覆盖 CRS 行为) -----------------------
# Include /data/nginx/conf/waf/custom-rules/*.conf
