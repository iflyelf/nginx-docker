# ==============================================================================
# Coraza WAF 网站防火墙配置 (libcoraza + coraza-nginx)
# https://github.com/corazawaf/coraza-nginx
# ==============================================================================
# 本配置在 http 上下文生效, 对所有 server/location 全局启用
# 如需对特定站点关闭, 在对应 server/location 中设置 coraza off;
# ==============================================================================

# 开启 Coraza WAF
coraza on;

# 加载规则链 (引擎配置 + OWASP CRS 规则集)
coraza_rules_file /data/nginx/conf/waf/coraza.conf;
